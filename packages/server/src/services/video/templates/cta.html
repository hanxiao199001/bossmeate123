<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_base.css"/>
<style>
  body { background: linear-gradient(145deg, #c026d3 0%, #e11d48 50%, #f59e0b 100%); }
  .cta-wrap {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .hint {
    font-size: 34px;
    font-weight: 500;
    letter-spacing: 6px;
    opacity: 0.85;
  }
  .hero {
    font-size: 168px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 12px;
    text-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
  }
  .sub {
    font-size: 44px;
    font-weight: 600;
    opacity: 0.92;
    line-height: 1.4;
    max-width: 880px;
  }
  .divider {
    width: 160px;
    height: 4px;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    opacity: 0.7;
    margin: 8px 0;
  }
  .contact {
    padding: 32px 56px;
    border: 2px solid rgba(255, 255, 255, 0.6);
    border-radius: 32px;
    background: rgba(0, 0, 0, 0.15);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: 3px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
  }
  .contact .label-sm {
    display: block;
    font-size: 26px;
    font-weight: 500;
    opacity: 0.75;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="cta-wrap">
    <div class="hint">更多期刊解读</div>
    <div class="hero">关 注 我 们</div>
    <div class="divider"></div>
    <div class="sub">{{ctaSubtitle}}</div>
    <div class="contact">
      <span class="label-sm">微信公众号 · WeChat Official</span>
      {{contactHandle}}
    </div>
  </div>
  <div class="footer-brand">{{journalName}} · 投稿指南</div>
</div>
</body>
</html>
