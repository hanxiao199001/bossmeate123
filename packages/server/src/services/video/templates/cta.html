<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5a0a93 100%);
    font-family: "Noto Sans CJK SC", "Noto Sans SC", "WenQuanYi Micro Hei", "PingFang SC", sans-serif;
    color: white;
    display: flex; flex-direction: column; align-items: center;
  }
  .deco-1 { position: absolute; top: 0; left: -150px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%); }
  .deco-2 { position: absolute; top: 420px; right: -200px;
    width: 560px; height: 560px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,107,0.2), transparent 70%); }
  .deco-3 { position: absolute; bottom: 520px; left: -150px;
    width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,152,0,0.18), transparent 70%); }
  .top-bar { position: absolute; top: 0; left: 0; right: 0;
    height: 8px; background: linear-gradient(90deg, #ffd700, #ff6b6b, #ffd700); }
  .badge-top {
    margin-top: 180px;
    padding: 14px 44px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 34px;
    font-size: 28px; letter-spacing: 6px; font-weight: 500;
    backdrop-filter: blur(10px);
  }
  .journal-name {
    margin-top: 40px;
    font-size: 80px; font-weight: 900;
    text-align: center; padding: 0 60px;
    line-height: 1.2;
    text-shadow: 0 4px 30px rgba(0,0,0,0.35);
    max-width: 1000px;
  }
  .badge-row { margin-top: 28px; font-size: 32px; color: #ffe5e5; letter-spacing: 3px; }
  .badge-row:empty { display: none; }
  .main-card {
    margin-top: 64px;
    width: 920px;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 32px;
    padding: 60px 50px 50px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    position: relative; overflow: hidden;
  }
  .main-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #ffd700, #ff6b6b, #ffd700);
  }
  .cta-title {
    font-size: 56px; font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .cta-sub {
    font-size: 38px; color: #ffe5e5;
    letter-spacing: 3px; margin-bottom: 36px;
  }
  .tag-row {
    display: flex; gap: 18px; justify-content: center; margin-bottom: 30px;
  }
  .tag {
    padding: 12px 28px; border-radius: 24px;
    font-size: 24px; font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }
  .tag-1 { background: linear-gradient(135deg, #ff6b6b, #e53935); }
  .tag-2 { background: linear-gradient(135deg, #ff9800, #e65100); }
  .tag-3 { background: linear-gradient(135deg, #9c27b0, #6a1b9a); }
  .cta-desc {
    font-size: 26px; color: #ffeaea;
    letter-spacing: 2px;
    opacity: 0.9;
  }
  .follow-btn {
    margin-top: 46px;
    width: 600px;
    padding: 26px 0;
    background: linear-gradient(135deg, #ff6b6b, #ffa07a);
    border-radius: 50px;
    text-align: center;
    font-size: 42px; font-weight: 900; letter-spacing: 8px;
    box-shadow: 0 20px 44px rgba(255,107,107,0.5),
                0 0 0 1px rgba(255,255,255,0.2) inset;
  }
  .footer {
    position: absolute; left: 0; right: 0; bottom: 470px;
    text-align: center;
  }
  .footer-line {
    width: 600px; height: 2px; margin: 0 auto 22px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
  }
  .footer-text { font-size: 26px; color: rgba(255,255,255,0.75); letter-spacing: 3px; }
</style>
</head>
<body>
  <div class="deco-1"></div>
  <div class="deco-2"></div>
  <div class="deco-3"></div>
  <div class="top-bar"></div>
  <div class="badge-top">✨ 期 刊 分 析 专 家</div>
  <div class="journal-name">{{name}}</div>
  <div class="badge-row">{{badge}}</div>
  <div class="main-card">
    <div class="cta-title">关 注 我</div>
    <div class="cta-sub">了解更多期刊推荐</div>
    <div class="tag-row">
      <span class="tag tag-1">投 稿 方 案</span>
      <span class="tag tag-2">期 刊 速 览</span>
      <span class="tag tag-3">影 响 因 子</span>
    </div>
    <div class="cta-desc">每 日 更 新 · 专 业 解 读 · 持 续 分 享</div>
    <div class="follow-btn">立 即 关 注</div>
  </div>
  <div class="footer">
    <div class="footer-line"></div>
    <div class="footer-text">学 术 期 刊 一 站 式 推 荐 平 台</div>
  </div>
</body>
</html>
